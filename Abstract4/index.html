<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract4 - Neon Cyber Lattice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scanlines"></div>
    <div id="overlay">
        <div class="overlay-inner">
            <div class="glitch-wrap">
                <div class="title-block">
                    <span class="title-main">NEON</span>
                    <span class="title-sub">// CYBER LATTICE SPECTRUM //</span>
                </div>
            </div>
            <div class="sys-info">
                <span class="sys-line">[SYS] HEX CIRCUIT FIELD ONLINE</span>
                <span class="sys-line">[SYS] AWAITING VIDEO + AUDIO STREAM</span>
            </div>
            <button id="startBtn">[ AWAKEN ]</button>
            <p class="hint">Select tab or screen, then enable Share Audio</p>
        </div>
    </div>

    <canvas id="visualizer"></canvas>

    <div id="controlsPanel" class="hidden">
        <div class="panel-section">
            <div class="panel-header">// WORLDS</div>
            <div class="preset-grid" id="presetGrid"></div>
        </div>

        <div class="panel-section">
            <div class="panel-header">// CYBER PHYSICS</div>
            <label>Paint Intensity
                <input type="range" id="ctrlIntensity" min="0" max="2" step="0.1" value="1.35">
            </label>
            <label>Hex Density
                <input type="range" id="ctrlRings" min="14" max="90" step="1" value="40">
            </label>
            <label>Audio Reactivity
                <input type="range" id="ctrlReact" min="0" max="2" step="0.05" value="1.15">
            </label>
            <label>Circuit Glow
                <input type="range" id="ctrlNoise" min="0" max="50" step="1" value="22">
            </label>
            <label>Signal Bias
                <input type="range" id="ctrlSpin" min="-2" max="2" step="0.1" value="-0.2">
            </label>
        </div>

        <div class="panel-section">
            <div class="panel-header">// SIGNAL BODY</div>
            <label>Dark Threshold
                <input type="range" id="ctrlHole" min="0" max="0.5" step="0.01" value="0.1">
            </label>
            <label>Trace Thickness
                <input type="range" id="ctrlThickness" min="0.4" max="2.6" step="0.1" value="0.9">
            </label>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
