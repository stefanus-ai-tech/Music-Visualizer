<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract5 - ARFV Stable Fluids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scanlines"></div>
    <div id="overlay">
        <div class="overlay-inner">
            <div class="glitch-wrap">
                <div class="title-block">
                    <span class="title-main">ARFV</span>
                    <span class="title-sub">// AUDIO-REACTIVE FLUID VISUALIZER //</span>
                </div>
            </div>
            <div class="sys-info">
                <span class="sys-line">[SYS] STABLE FLUIDS CORE ONLINE</span>
                <span class="sys-line">[SYS] AWAITING VIDEO + AUDIO STREAM</span>
            </div>
            <button id="startBtn">[ AWAKEN ]</button>
            <p class="hint">Select tab or screen, then enable Share Audio</p>
        </div>
    </div>

    <canvas id="visualizer"></canvas>

    <div id="controlsPanel" class="hidden">
        <div class="panel-section">
            <div class="panel-header">// WORLDS</div>
            <div class="preset-grid" id="presetGrid"></div>
        </div>

        <div class="panel-section">
            <div class="panel-header">// FLUID PHYSICS</div>
            <label>Density Gain
                <input type="range" id="ctrlIntensity" min="0" max="2" step="0.1" value="0.78">
            </label>
            <label>Solver Quality
                <input type="range" id="ctrlRings" min="4" max="24" step="1" value="12">
            </label>
            <label>Audio Reactivity
                <input type="range" id="ctrlReact" min="0" max="2" step="0.05" value="1.15">
            </label>
            <label>Bass Force
                <input type="range" id="ctrlBounce" min="0" max="3" step="0.05" value="1.15">
            </label>
            <label>Explosion Strength
                <input type="range" id="ctrlExplosion" min="0" max="3" step="0.05" value="1.35">
            </label>
            <label>Vorticity
                <input type="range" id="ctrlNoise" min="0" max="50" step="1" value="28">
            </label>
            <label>Flow Bias
                <input type="range" id="ctrlSpin" min="-2" max="2" step="0.1" value="0">
            </label>
        </div>

        <div class="panel-section">
            <div class="panel-header">// RENDERING</div>
            <label>Dissipation
                <input type="range" id="ctrlHole" min="0.90" max="0.999" step="0.001" value="0.948">
            </label>
            <label>Bloom Strength
                <input type="range" id="ctrlThickness" min="0.4" max="2.6" step="0.1" value="0.55">
            </label>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
