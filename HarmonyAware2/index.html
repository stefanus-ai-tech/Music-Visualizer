<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N3 — Living Audiovisual Organism</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="overlay-inner">
            <div class="title-block">
                <span class="title-n3">N3</span>
                <span class="title-sub">Living Organism v5</span>
            </div>
            <button id="startBtn">Initialize</button>
            <p class="hint">Select a Tab or Screen → enable "Share Audio"</p>
        </div>
    </div>

    <canvas id="visualizer" width="1080" height="1920"></canvas>

    <div id="controlsPanel" class="hidden">
        <div class="panel-header">ORGANIC MUTATION</div>
        
        <label>Feedback Trail
            <input type="range" id="ctrlFeedback" min="0" max="0.98" step="0.01" value="0.90">
        </label>
        
        <label>Swirl Speed
            <input type="range" id="ctrlRotation" min="-3" max="3" step="0.1" value="0.5">
        </label>
        
        <label>Cellular Complexity
            <input type="range" id="ctrlComplexity" min="1" max="8" step="1" value="5">
        </label>
        
        <!-- <label>Hue Shift Rate
            <input type="range" id="ctrlColor" min="0.1" max="5" step="0.1" value="1.2">
        </label> -->

        <label>Beat Shake Intensity
            <input type="range" id="ctrlShake" min="0" max="1" step="0.05" value="0.6">
        </label>

        <label>Liquid Blend Softness
            <input type="range" id="ctrlSoftness" min="0.1" max="1" step="0.05" value="0.8">
        </label>
    </div>

    <div id="stateIndicator">
        <span id="stateName">—</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
